name: ADAS Release Gate

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "Build ID (e.g. adas-2026.04.23-rc1)"
        required: true
        default: "manual-build"
      suite:
        description: "Suite scope"
        required: true
        default: "all"
        type: choice
        options:
          - smoke
          - regression
          - all

jobs:
  release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: adas_release_test_suite_python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run release gate
        working-directory: adas_release_test_suite_python
        run: |
          python run_release_gate.py --build-id "${{ github.event.inputs.build_id }}" --suite "${{ github.event.inputs.suite }}"

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adas-release-gate-${{ github.event.inputs.build_id }}-${{ github.event.inputs.suite }}
          path: adas_release_test_suite_python/reports/
