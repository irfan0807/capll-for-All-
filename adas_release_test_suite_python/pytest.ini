[pytest]
addopts = -q -ra --strict-markers --maxfail=25
xfail_strict = true
filterwarnings =
    error
markers =
    smoke: Critical release-smoke scenarios
    regression: Full regression scenarios
    edge: Edge and boundary scenarios
    aeb: Automatic Emergency Braking scenarios
    fcw: Forward Collision Warning scenarios
    acc: Adaptive Cruise Control scenarios
    lka: Lane Keep Assist scenarios
    bsd: Blind Spot Detection scenarios
    tsr: Traffic Sign Recognition scenarios
    dms: Driver Monitoring scenarios
